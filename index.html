<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OussamaShoes AI - Chargement...</title>
    <style>
        body {
            background-color: #04010a; /* Couleur de fond (noir/violet) de votre site */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #8b5cf6; /* Violet */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        a { color: #c084fc; text-decoration: none; font-weight: bold; margin-top: 10px; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h1>Lancement de OussamaShoes AI...</h1>
    <p>Vous êtes redirigé vers l'application.</p>
    
    <script>
        // Redirection immédiate vers le serveur Next.js en cours d'exécution
        setTimeout(() => {
            window.location.href = "http://localhost:3001/studio";
        }, 500); // Petit délai pour montrer le bel écran de chargement
    </script>

    <!-- Si la redirection JS ne marche pas -->
    <noscript>
        <a href="http://localhost:3001/studio">Cliquez ici pour aller au Studio 3D</a>
    </noscript>
</body>
</html>
